name: Deploy to Johannesburg VM

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Check Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check syntax
        run: |
          python3 -m py_compile src/config.py
          python3 -m py_compile src/logger.py
          python3 -m py_compile src/execution/client.py
          python3 -m py_compile src/execution/executor.py
          python3 -m py_compile src/notifier.py
          python3 -m py_compile src/scanner.py
          python3 -m py_compile src/telegram_bot.py
          echo "All files passed syntax check"

  test:
    name: Run Mock Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: [lint, test]

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1002379129318/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@polymarket-02.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'beta'

      - name: Deploy via IAP tunnel
        run: |
          gcloud compute ssh poly-bot-joburg \
            --project=polymarket-02 \
            --zone=africa-south1-a \
            --tunnel-through-iap \
            --strict-host-key-checking=no \
            --command="bash /home/ifeekaffy_gmail_com/polymarket_bot/deploy.sh"
