name: Deploy to Doha VM

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Check Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check syntax
        run: |
          python3 -m py_compile src/execution/client.py
          python3 -m py_compile src/execution/executor.py
          python3 -m py_compile src/notifier.py
          python3 -m py_compile src/telegram_bot.py
          echo "All files passed syntax check"

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/okaforprincess32/polymarket_bot
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt -q
            sudo systemctl restart polymarket-telegram
            sudo systemctl status polymarket-telegram --no-pager
            echo "Deployment complete"
